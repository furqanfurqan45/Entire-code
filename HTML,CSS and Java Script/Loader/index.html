<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Loader</title>
  <style>
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .dot {
      width: 100%;
      height: 100%;
      position: absolute;
      animation: rotate 1.2s linear infinite;
    }

    .dot::before {
      content: "";
      display: block;
      width: 16px;
      height: 16px;
      background: #00ffe1;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
      transform: translate(32px, 0);
    }

    @keyframes rotate {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% {
        transform: translate(32px, 0) scale(1);
        opacity: 1;
      }
      50% {
        transform: translate(32px, 0) scale(0.6);
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="dot"></div>
  </div>
</body>
</html>
